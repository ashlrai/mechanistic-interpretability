name: acdc-lite-ioi-gpt2
family: acdc_lite
backend: transformerlens
description: >-
  Node-level ACDC on GPT-2 small for the canonical IOI task (Wang et al., 2022).
  Companion to acdc-edge-ioi-gpt2: same 30-prompt corpus, same layers 5-11,
  but scores whole nodes (heads) rather than directed edges. Cheaper and faster;
  used to compare node-level vs edge-level recall of the 12 canonical IOI heads.
  Full corpus saved to experiments/ioi_prompts.jsonl.
parameters:
  model: gpt2-small
