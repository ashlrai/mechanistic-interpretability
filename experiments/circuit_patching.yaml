name: circuit-patching-smoke
family: circuit_patching
backend: transformerlens
description: Real clean-to-corrupted residual-stream activation patching smoke run.
parameters:
  model: gpt2-small
  source_prompt: "The Eiffel Tower is in Paris"
  target_prompt: "The Eiffel Tower is in Rome"
  answer_tokens:
    correct: " Paris"
    incorrect: " Rome"
  layers: [0]
  patch_sites: ["resid_pre"]
  target_position: -1
  patch_position: -1
  artifact_policy:
    retain_activation_tensors: false
    write_report: true
