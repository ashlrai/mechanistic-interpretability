name: direct-logit-attribution-factual
family: direct_logit_attribution
backend: transformerlens
description: >
  Decompose final-token logit contributions for factual recall prompts on
  gpt2-small. Ranks every attention head and MLP layer by their direct logit
  attribution score (unembed-projected component output) without any ablation.
  Identifies which components most strongly push toward the correct answer token.

parameters:
  model: gpt2-small
  device: cpu
  seed: 42
  target_position: -1
  top_k: 10
  prompt_pairs:
    - id: capital-france
      clean_prompt: "The capital of France is"
      correct_token: " Paris"
      incorrect_token: " London"
    - id: capital-italy
      clean_prompt: "The capital of Italy is"
      correct_token: " Rome"
      incorrect_token: " Paris"
    - id: capital-germany
      clean_prompt: "The capital of Germany is"
      correct_token: " Berlin"
      incorrect_token: " Paris"
    - id: tower-city
      clean_prompt: "The Eiffel Tower is in"
      correct_token: " Paris"
      incorrect_token: " Rome"
