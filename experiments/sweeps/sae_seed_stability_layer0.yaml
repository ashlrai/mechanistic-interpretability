name: polysemanticity-sae-smoke
family: polysemanticity_sae
backend: transformerlens
description: Top-K SAE on gpt2-small layer-0 residual stream. Trains on a synthesised
  100-document corpus covering geography, biology, code, and history so the feature
  dictionary has real signal across diverse token distributions.
parameters:
  model: gpt2-small
  hook_site: blocks.0.hook_resid_pre
  n_features: 128
  k: 8
  epochs: 8
  batch_size: 64
  learning_rate: 0.001
  seed: 42
  device: cpu
  corpus_path: data/prompts/openwebtext_sample.jsonl
  seq_len: 64
  max_tokens: 2000
  artifact_policy:
    retain_weights: true
    write_feature_analysis: true
    top_prompts_per_feature: 5
matrix:
  parameters.seed:
  - 1
  - 2
  - 3
  - 4
  - 5
