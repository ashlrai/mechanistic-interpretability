name: polysemanticity-sae-smoke
family: polysemanticity_sae
backend: transformerlens
description: >-
  Matrix sweep over SAE feature-dictionary size (n_features) with a fixed
  sparsity level (k=8) on the small openwebtext corpus. Reveals the
  reconstruction-sparsity trade-off as the dictionary grows.
parameters:
  model: gpt2-small
  hook_site: blocks.0.hook_resid_pre
  k: 8
  epochs: 8
  batch_size: 64
  learning_rate: 0.001
  seed: 42
  device: cpu
  corpus_path: data/prompts/openwebtext_sample.jsonl
  seq_len: 64
  max_tokens: 2000
  artifact_policy:
    retain_weights: true
    write_feature_analysis: true
    top_prompts_per_feature: 5
matrix:
  parameters.n_features: [64, 128, 256]
