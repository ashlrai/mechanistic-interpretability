name: polysemanticity-sae-layer6-512-scale
family: polysemanticity_sae
backend: transformerlens
description: 'Scale-control for the SAE seed-stability investigation. Identical to
  the layer6-512 seed-stability condition (gpt2-small blocks.6.hook_resid_pre, 512
  features, k=32) EXCEPT it trains on the real pile-1k corpus at max_tokens=30000
  (30x the original 992-token openwebtext_sample run). Purpose: test whether the observed
  cross-seed feature instability survives realistic training scale or was a low-data
  / high-dead-feature artifact.

  '
parameters:
  model: gpt2-small
  hook_site: blocks.6.hook_resid_pre
  n_features: 512
  k: 32
  epochs: 10
  batch_size: 256
  learning_rate: 0.001
  seed: 42
  device: cpu
  corpus_path: data/prompts/pile-1k.jsonl
  seq_len: 128
  max_tokens: 30000
  artifact_policy:
    retain_weights: true
    write_feature_analysis: true
    top_prompts_per_feature: 5
matrix:
  parameters.seed:
  - 1
  - 2
  - 3
  - 4
  - 5
