<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "MI Cockpit" }}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; color: #172026; background: #f7f8fa; }
      header { background: #172026; color: white; padding: 14px 24px; }
      nav a { color: white; margin-right: 16px; text-decoration: none; }
      main { max-width: 1180px; margin: 0 auto; padding: 24px; }
      section { margin-bottom: 28px; }
      table { width: 100%; border-collapse: collapse; background: white; }
      th, td { padding: 9px 10px; border-bottom: 1px solid #d8dee4; text-align: left; vertical-align: top; }
      th { background: #eef1f4; font-weight: 650; }
      button, .button { background: #176b87; color: white; border: 0; border-radius: 6px; padding: 8px 12px; text-decoration: none; cursor: pointer; }
      pre { background: white; padding: 14px; overflow: auto; border: 1px solid #d8dee4; }
      .muted { color: #66717a; }
      .actions { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
      .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
      .status-card { background: white; border: 1px solid #d8dee4; border-radius: 8px; padding: 12px; }
      .status-card strong { display: block; font-size: 1.6rem; line-height: 1.2; margin-top: 4px; }
      td form { display: inline-block; margin: 0 6px 6px 0; }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/queue">Queue</a>
        <a href="/runs">Runs</a>
        <a href="/reports">Reports</a>
      </nav>
    </header>
    <main id="content" hx-boost="true">{% block content %}{% endblock %}</main>
  </body>
</html>
